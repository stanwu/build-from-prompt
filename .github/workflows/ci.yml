name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --quiet --depth 1 https://github.com/bats-core/bats-core.git test/bats-src
          test/bats-src/install.sh test/bats
          rm -rf test/bats-src

      - name: Lint (bash -n)
        run: make lint

      - name: Unit tests
        run: make test
